services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: xtinadom_merch
    ports:
      - "5432:5432"
    volumes:
      - xtinadom_pgdata:/var/lib/postgresql/data

volumes:
  xtinadom_pgdata:
